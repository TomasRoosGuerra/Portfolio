<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tomas Roos — Designer</title>
    <meta name="description" content="Tomas Roos is a product and visual designer based in Stockholm." />
    <meta name="theme-color" content="#f2f2f2" />
    <meta property="og:title" content="Tomas Roos — Designer" />
    <meta property="og:description" content="Selected works in product design, UI/UX, and visual identity." />
    <meta property="og:type" content="website" />
    <link rel="icon" href="assets/favicon.png" />

    <!-- Preload hero image so skeleton → real transition is instant -->
    <link rel="preload" as="image" href="assets/tidings/tidings.png" />
    <link rel="preload" as="image" href="assets/brael/brael.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --bg: #f2f2f2;
        --text: #111;
        --muted: #555;
        --accent: #bfff00;
        --accent-hover: #a8e600;
        --font: Roboto, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        --container: 1400px;
        --gutter: clamp(20px, 4vw, 64px);
        --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
      }

      html { scroll-behavior: smooth; scroll-padding-top: 72px; }

      body {
        font-family: var(--font);
        color: var(--text);
        background: var(--bg);
        font-size: 16px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      /* ════════════════════════════════════════
         1 · SCROLL PROGRESS BAR  (Completion)
         ════════════════════════════════════════ */
      .scroll-progress {
        position: fixed;
        top: 0; left: 0;
        height: 3px;
        width: 0%;
        background: var(--accent);
        z-index: 200;
        transition: none;
        pointer-events: none;
      }

      /* ════════════════════════════════════════
         2 · HEADER  (Minimal — one exit point)
         ════════════════════════════════════════ */
      .site-header {
        position: fixed;
        top: 3px; /* sit below progress bar */
        width: 100%;
        z-index: 100;
        transition: background 0.4s var(--ease), top 0.3s var(--ease);
      }
      .site-header.scrolled {
        background: rgba(242, 242, 242, 0.92);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .header-wrap {
        max-width: var(--container);
        margin: 0 auto;
        padding: 0 var(--gutter);
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 56px;
      }
      .brand { text-decoration: none; display: flex; align-items: center; }
      .brand-logo { height: 20px; width: auto; display: block; transition: opacity 0.2s; }
      .brand:hover .brand-logo { opacity: 0.5; }

      /* Single nav link — Power of One: only one thing to click */
      .nav__link {
        color: var(--muted);
        text-decoration: none;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        transition: color 0.2s;
      }
      .nav__link:hover { color: var(--text); }

      /* ════════════════════════════════════════
         3 · HERO — Full viewport (Unit Bias)
         ════════════════════════════════════════ */
      .hero {
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 0 var(--gutter);
        position: relative;
      }
      .hero-inner {
        max-width: var(--container);
        margin: 0 auto;
        width: 100%;
      }
      .hero__eyebrow {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 16px;
        opacity: 0; animation: fadeUp 0.8s 0.1s both var(--ease);
      }
      .hero__title {
        font-size: clamp(2rem, 4.5vw, 3.5rem);
        font-weight: 300;
        line-height: 1.08;
        letter-spacing: -0.03em;
        max-width: 700px;
        opacity: 0; animation: fadeUp 0.9s 0.2s both var(--ease);
      }
      .hero__subtitle {
        font-size: clamp(0.9rem, 1.6vw, 1.05rem);
        color: var(--muted);
        margin-top: 20px;
        max-width: 400px;
        line-height: 1.6;
        opacity: 0; animation: fadeUp 0.9s 0.35s both var(--ease);
      }

      /* Scroll indicator — single animated chevron */
      .hero__scroll {
        position: absolute;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%);
        opacity: 0;
        animation: fadeUp 0.8s 0.7s both var(--ease), bounce 2.4s 1.5s ease-in-out infinite;
      }
      .hero__scroll svg {
        width: 24px;
        height: 24px;
        stroke: var(--muted);
        stroke-width: 1.5;
      }
      @keyframes bounce {
        0%, 100% { transform: translateX(-50%) translateY(0); }
        50%      { transform: translateX(-50%) translateY(10px); }
      }

      /* ════════════════════════════════════════
         4 · ABOUT STRIP  (Compact, no exit links)
         ════════════════════════════════════════ */
      .about-bar {
        max-width: var(--container);
        margin: 0 auto;
        padding: 20px var(--gutter) 20px;
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 1px solid rgba(0,0,0,0.07);
        opacity: 0;
        animation: fadeUp 0.8s 0.5s both var(--ease);
      }
      .about-bar__avatar {
        width: 32px; height: 32px;
        overflow: hidden; flex-shrink: 0;
        border-radius: 50%;
      }
      .about-bar__avatar img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(30%); }
      .about-bar__text { font-size: 13px; color: var(--muted); }
      .about-bar__badge {
        display: inline-block;
        padding: 2px 7px;
        background: var(--accent);
        color: var(--text);
        font-size: 9px; font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-left: 7px;
        vertical-align: middle;
      }

      /* ════════════════════════════════════════
         5 · WORK SECTION  (Linear, focused)
         ════════════════════════════════════════ */
      .section-label {
        font-size: 11px; font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 28px;
        padding-bottom: 14px;
        border-bottom: 1px solid rgba(0,0,0,0.08);
      }

      .work {
        max-width: var(--container);
        margin: 0 auto;
        padding: 48px var(--gutter) 80px;
      }
      .work__grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: clamp(28px, 4vw, 56px);
      }

      /* ─── Project Card ─── */
      .card { position: relative; }
      .card__link { display: block; text-decoration: none; color: inherit; }

      .card__img {
        aspect-ratio: 16/10;
        overflow: hidden;
        position: relative;
        /* Skeleton: gray shimmer placeholder while image loads */
        background: linear-gradient(90deg, #e0e0e0 25%, #ebebeb 50%, #e0e0e0 75%);
        background-size: 200% 100%;
        animation: shimmer 1.6s ease infinite;
      }
      .card__img.loaded { animation: none; background: #e5e5e5; }

      @keyframes shimmer {
        0%   { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      .card__img img {
        width: 100%; height: 100%;
        object-fit: cover; display: block;
        opacity: 0; /* hidden until loaded */
        transition: transform 0.7s var(--ease), opacity 0.4s ease;
      }
      .card__img img.loaded { opacity: 1; }

      .card:hover .card__img img.loaded { transform: scale(1.04); opacity: 0.88; }
      /* Micro-interaction: tactile press feedback */
      .card:active .card__img img.loaded { transform: scale(0.98); transition-duration: 0.1s; }

      .card__impact {
        position: absolute; bottom: 12px; right: 12px;
        background: var(--accent); color: var(--text);
        font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
        padding: 5px 10px;
        opacity: 0; transform: translateY(6px);
        transition: opacity 0.3s, transform 0.3s;
        z-index: 2;
      }
      .card:hover .card__impact { opacity: 1; transform: translateY(0); }

      .card__cta {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        opacity: 0; transition: opacity 0.3s;
        pointer-events: none;
      }
      .card:hover .card__cta { opacity: 1; }
      .card__cta-label {
        background: var(--text); color: #fff;
        font-size: 11px; font-weight: 600;
        letter-spacing: 0.1em; text-transform: uppercase;
        padding: 10px 20px;
      }

      .card__info { padding-top: 14px; display: flex; flex-direction: column; gap: 4px; }
      .card__meta-row { display: flex; align-items: center; gap: 10px; }
      .card__category {
        font-size: 10px; font-weight: 600;
        letter-spacing: 0.1em; text-transform: uppercase;
        color: var(--muted);
      }
      .card__title { font-size: 17px; font-weight: 500; line-height: 1.25; }
      .card__role { font-size: 13px; color: var(--muted); }

      /* ════════════════════════════════════════
         6 · EXTRA WORK — infinite marquee
         ════════════════════════════════════════ */
      .extra-work { padding: 0 0 100px; }
      .extra-work__header {
        max-width: var(--container);
        margin: 0 auto;
        padding: 0 var(--gutter) 28px;
      }

      .extra-work__track {
        overflow: hidden;
        -webkit-mask-image: linear-gradient(to right, transparent 0%, black 10%, black 90%, transparent 100%);
        mask-image: linear-gradient(to right, transparent 0%, black 10%, black 90%, transparent 100%);
      }

      .extra-work__strip {
        display: flex;
        gap: 10px;
        width: max-content;
        animation: marquee 50s linear infinite;
        will-change: transform;
      }
      .extra-work__strip:hover { animation-play-state: paused; }

      @keyframes marquee {
        from { transform: translateX(0); }
        to   { transform: translateX(-50%); }
      }

      .extra-tile {
        position: relative;
        flex: 0 0 clamp(220px, 24vw, 360px);
        height: 240px;
        overflow: hidden;
        background: #d0d0d0;
      }
      .extra-tile img {
        width: 100%; height: 100%;
        object-fit: cover; display: block;
        transition: transform 0.6s var(--ease);
        pointer-events: none; user-select: none;
      }
      .extra-tile:hover img { transform: scale(1.06); }

      .extra-tile__overlay {
        position: absolute; inset: 0;
        background: linear-gradient(to top, rgba(0,0,0,0.68) 0%, rgba(0,0,0,0.06) 46%, transparent 100%);
        opacity: 0.5;
        transition: opacity 0.3s;
        display: flex; flex-direction: column;
        justify-content: flex-end;
        padding: 14px 16px;
        pointer-events: none;
      }
      .extra-tile:hover .extra-tile__overlay { opacity: 1; }
      .extra-tile__overlay-title { color: #fff; font-size: 13px; font-weight: 500; line-height: 1.3; margin-bottom: 2px; }
      .extra-tile__overlay-cat { color: rgba(255,255,255,0.5); font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; }

      @media (prefers-reduced-motion: reduce) {
        .extra-work__strip { animation: none; }
        .card__img { animation: none; }
      }

      /* ════════════════════════════════════════
         7 · CTA SECTION  (Single focal point)
         ════════════════════════════════════════ */
      .cta-section {
        padding: 120px 0;
        text-align: center;
      }
      .cta-section__wrap {
        max-width: var(--container);
        margin: 0 auto;
        padding: 0 var(--gutter);
      }
      .cta-section__heading {
        font-size: clamp(1.75rem, 4vw, 3rem);
        font-weight: 300;
        letter-spacing: -0.03em;
        line-height: 1.1;
        margin-bottom: 32px;
      }
      .cta-section__btn {
        display: inline-flex; align-items: center; gap: 10px;
        padding: 16px 40px;
        background: var(--accent); color: var(--text);
        text-decoration: none;
        font-size: 13px; font-weight: 600;
        letter-spacing: 0.06em; text-transform: uppercase;
        transition: background 0.2s, transform 0.15s;
      }
      .cta-section__btn:hover { background: var(--accent-hover); }
      .cta-section__btn:active { transform: scale(0.97); }

      /* ════════════════════════════════════════
         8 · FLOATING ACTION BUTTON  (Thumb zone)
         ════════════════════════════════════════ */
      .fab {
        position: fixed;
        bottom: 28px; right: 28px;
        z-index: 90;
        width: 56px; height: 56px;
        border-radius: 50%;
        background: var(--accent);
        color: var(--text);
        border: none;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
        box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        /* Hidden by default, JS shows it after hero */
        opacity: 0; transform: translateY(20px) scale(0.9);
        visibility: hidden;
        transition: opacity 0.35s var(--ease), transform 0.35s var(--ease), visibility 0.35s, background 0.2s;
      }
      .fab.visible {
        opacity: 1; transform: translateY(0) scale(1);
        visibility: visible;
      }
      .fab:hover { background: var(--accent-hover); transform: translateY(0) scale(1.06); }
      .fab:active { transform: translateY(0) scale(0.95); }
      .fab svg { width: 22px; height: 22px; }

      /* ════════════════════════════════════════
         9 · FOOTER  (Clean canvas — minimal)
         ════════════════════════════════════════ */
      .site-footer {
        padding: 24px 0;
        border-top: 1px solid rgba(0,0,0,0.06);
      }
      .site-footer__wrap {
        max-width: var(--container);
        margin: 0 auto;
        padding: 0 var(--gutter);
        display: flex; justify-content: space-between; align-items: center;
      }
      .site-footer__copy { font-size: 12px; color: var(--muted); }
      .site-footer__link {
        font-size: 12px; color: var(--muted);
        text-decoration: none; transition: color 0.2s;
      }
      .site-footer__link:hover { color: var(--text); }

      /* ════════════════════════════════════════
         10 · CURSOR DOT
         ════════════════════════════════════════ */
      .cursor-dot {
        position: fixed;
        width: 8px; height: 8px;
        background: var(--text);
        border-radius: 50%;
        pointer-events: none; z-index: 9997;
        transform: translate(-50%, -50%);
        transition: width 0.25s, height 0.25s, background 0.25s, opacity 0.25s;
        mix-blend-mode: difference;
        opacity: 0;
      }
      .cursor-dot.visible { opacity: 1; }
      .cursor-dot.hover {
        width: 48px; height: 48px;
        background: var(--accent);
        mix-blend-mode: normal; opacity: 0.7;
      }

      /* ════════════════════════════════════════
         11 · PAGE LOADER
         ════════════════════════════════════════ */
      .page-loader {
        position: fixed; inset: 0; z-index: 10000;
        background: var(--bg);
        display: flex; align-items: center; justify-content: center;
        transition: opacity 0.5s ease, visibility 0.5s;
      }
      .page-loader.loaded { opacity: 0; visibility: hidden; pointer-events: none; }

      /* ════════════════════════════════════════
         12 · ANIMATIONS
         ════════════════════════════════════════ */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(28px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .reveal {
        opacity: 0; transform: translateY(28px);
        transition: opacity 0.8s var(--ease), transform 0.8s var(--ease);
      }
      .reveal.visible { opacity: 1; transform: translateY(0); }

      .stagger > * {
        opacity: 0; transform: translateY(20px);
        transition: opacity 0.6s var(--ease), transform 0.6s var(--ease);
      }
      .stagger.visible > * { opacity: 1; transform: translateY(0); }
      .stagger.visible > *:nth-child(1)  { transition-delay: 0s; }
      .stagger.visible > *:nth-child(2)  { transition-delay: 0.08s; }
      .stagger.visible > *:nth-child(3)  { transition-delay: 0.16s; }
      .stagger.visible > *:nth-child(4)  { transition-delay: 0.24s; }
      .stagger.visible > *:nth-child(5)  { transition-delay: 0.32s; }
      .stagger.visible > *:nth-child(6)  { transition-delay: 0.40s; }

      /* ════════════════════════════════════════
         13 · RESPONSIVE
         ════════════════════════════════════════ */
      @media (max-width: 768px) {
        .cursor-dot { display: none !important; }
        .hero { min-height: 92svh; }
        .work__grid { grid-template-columns: 1fr; gap: 40px; }
        .about-bar { flex-wrap: wrap; gap: 10px; }
        .cta-section { padding: 80px 0; }
        .fab { bottom: 20px; right: 20px; width: 50px; height: 50px; }
        .fab svg { width: 20px; height: 20px; }
      }

      @media (max-width: 480px) {
        .extra-tile { flex: 0 0 72vw; height: 200px; }
        .extra-work__track {
          -webkit-mask-image: linear-gradient(to right, transparent 0%, black 5%, black 95%, transparent 100%);
          mask-image: linear-gradient(to right, transparent 0%, black 5%, black 95%, transparent 100%);
        }
        .cta-section__heading { font-size: 1.6rem; }
        .site-footer__wrap { flex-direction: column; gap: 8px; text-align: center; }
      }
    </style>
  </head>
  <body>
    <!-- Scroll progress bar -->
    <div class="scroll-progress" aria-hidden="true"></div>

    <!-- Page loader -->
    <div class="page-loader" aria-hidden="true">
      <img src="assets/tomas-roos-logo.svg" alt="" style="height:24px;opacity:0.3" />
    </div>

    <!-- Custom cursor -->
    <div class="cursor-dot" aria-hidden="true"></div>

    <!-- ─── Header: one logo, one link ─── -->
    <header class="site-header">
      <div class="header-wrap">
        <a class="brand" href="#top">
          <img src="assets/tomas-roos-logo.svg" alt="Tomas Roos" class="brand-logo" />
        </a>
        <a class="nav__link" href="#work">Work</a>
      </div>
    </header>

    <main id="content">
      <!-- ─── Hero: full viewport, single focus ─── -->
      <section id="top" class="hero">
        <div class="hero-inner">
          <p class="hero__eyebrow">Tomas Roos · Stockholm</p>
          <h1 class="hero__title">Visual &amp; Product Designer</h1>
          <p class="hero__subtitle">Crafting interfaces that startups count on — open to remote.</p>
        </div>
        <a href="#work" class="hero__scroll" aria-label="Scroll to work">
          <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </a>
      </section>

      <!-- ─── About strip: compact, no external links ─── -->
      <div class="about-bar" id="about">
        <div class="about-bar__avatar">
          <img src="assets/other/tomas-portrait.jpg" alt="Tomas Roos" loading="lazy" />
        </div>
        <span class="about-bar__text">Tomas Roos<span class="about-bar__badge">Available</span></span>
      </div>

      <!-- ─── Selected Work ─── -->
      <section id="work" class="work">
        <p class="section-label">Selected Work</p>
        <div class="work__grid stagger" id="work-grid"></div>
      </section>

      <!-- ─── Extra Work marquee ─── -->
      <section class="extra-work reveal" id="extra-work">
        <div class="extra-work__header">
          <p class="section-label">Extra Work</p>
        </div>
        <div class="extra-work__track">
          <div class="extra-work__strip" id="extra-grid" role="list" aria-label="Extra work samples"></div>
        </div>
      </section>
    </main>

    <!-- ─── CTA: one action ─── -->
    <section class="cta-section reveal">
      <div class="cta-section__wrap">
        <h2 class="cta-section__heading">Let's create something<br/>people love to use.</h2>
        <a class="cta-section__btn" href="mailto:tomas.roosguerra@gmail.com">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          Get in touch
        </a>
      </div>
    </section>

    <!-- ─── Footer: clean canvas ─── -->
    <footer class="site-footer">
      <div class="site-footer__wrap">
        <span class="site-footer__copy">&copy; <span id="year"></span> Tomas Roos</span>
        <a class="site-footer__link" href="https://www.linkedin.com/in/tomas-roos/" target="_blank" rel="noopener">LinkedIn</a>
      </div>
    </footer>

    <!-- ─── Floating Action Button (thumb zone) ─── -->
    <a class="fab" href="mailto:tomas.roosguerra@gmail.com" aria-label="Get in touch">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>
    </a>

    <script src="js/projects-data.js"></script>
    <script>
      (() => {
        "use strict";
        const $ = s => document.querySelector(s);
        const $$ = s => [...document.querySelectorAll(s)];
        const lerp = (a, b, t) => a + (b - a) * t;

        /* ── Year ── */
        const yearEl = $("#year");
        if (yearEl) yearEl.textContent = new Date().getFullYear();

        /* ── Page Loader ── */
        window.addEventListener("load", () => {
          const loader = $(".page-loader");
          if (loader) {
            setTimeout(() => loader.classList.add("loaded"), 150);
            setTimeout(() => loader.remove(), 750);
          }
        });

        /* ── Scroll progress bar (Completion psychology) ── */
        const progressBar = $(".scroll-progress");
        function updateProgress() {
          const scrollTop = window.scrollY;
          const docHeight = document.documentElement.scrollHeight - window.innerHeight;
          if (docHeight > 0 && progressBar) {
            progressBar.style.width = (scrollTop / docHeight * 100) + "%";
          }
        }

        /* ── Header scroll state ── */
        const header = $(".site-header");
        let lastScroll = 0;
        let rafId = 0;
        function onScroll() {
          cancelAnimationFrame(rafId);
          rafId = requestAnimationFrame(() => {
            const y = window.scrollY;
            header?.classList.toggle("scrolled", y > 60);
            updateProgress();
            updateFab(y);
            lastScroll = y;
          });
        }
        window.addEventListener("scroll", onScroll, { passive: true });

        /* ── FAB visibility (show after hero, hide when CTA is visible) ── */
        const fab = $(".fab");
        const ctaSection = $(".cta-section");
        function updateFab(y) {
          if (!fab) return;
          const heroHeight = $(".hero")?.offsetHeight || 600;
          const ctaTop = ctaSection?.getBoundingClientRect().top ?? 99999;
          const show = y > heroHeight * 0.7 && ctaTop > window.innerHeight * 0.6;
          fab.classList.toggle("visible", show);
        }

        /* ── Cursor dot ── */
        const dot = $(".cursor-dot");
        if (dot && window.matchMedia("(pointer:fine)").matches) {
          let mx = 0, my = 0, dx = 0, dy = 0;
          document.addEventListener("mousemove", e => { mx = e.clientX; my = e.clientY; dot.classList.add("visible"); });
          document.addEventListener("mouseleave", () => dot.classList.remove("visible"));
          (function tick() {
            dx = lerp(dx, mx, 0.14);
            dy = lerp(dy, my, 0.14);
            dot.style.left = dx + "px";
            dot.style.top = dy + "px";
            requestAnimationFrame(tick);
          })();
          const targets = "a, button, .card, .extra-tile, .fab";
          document.addEventListener("mouseover", e => { if (e.target.closest(targets)) dot.classList.add("hover"); });
          document.addEventListener("mouseout",  e => { if (e.target.closest(targets)) dot.classList.remove("hover"); });
        }

        /* ── Build project card with skeleton image loading ── */
        function buildProjectCard(item) {
          const el = document.createElement("article");
          el.className = "card";
          const href = item.caseStudyUrl || "#";
          const ctaLabel = item.caseStudyUrl ? "View case study" : "View work";
          const cat = (item.category || "").replace(/-/g, " ").replace(/\b\w/g, c => c.toUpperCase());

          el.innerHTML =
            `<a class="card__link" href="${href}">` +
              `<div class="card__img">` +
                `<img src="${item.imageUrl}" alt="${item.title}" loading="lazy" width="1600" height="1000" />` +
                (item.impact ? `<span class="card__impact">${item.impact}</span>` : "") +
                `<div class="card__cta"><span class="card__cta-label">${ctaLabel} →</span></div>` +
              `</div>` +
              `<div class="card__info">` +
                `<div class="card__meta-row">${cat ? `<span class="card__category">${cat}</span>` : ""}</div>` +
                `<h3 class="card__title">${item.title}</h3>` +
                `<p class="card__role">${item.role || "Design"}</p>` +
              `</div>` +
            `</a>`;

          // Skeleton → loaded transition
          const img = el.querySelector("img");
          const wrap = el.querySelector(".card__img");
          if (img) {
            const reveal = () => { img.classList.add("loaded"); wrap?.classList.add("loaded"); };
            if (img.complete) reveal();
            else img.addEventListener("load", reveal);
          }
          return el;
        }

        /* ── Build extra tile ── */
        function buildExtraTile(item) {
          const el = document.createElement("div");
          el.className = "extra-tile";
          el.setAttribute("role", "listitem");
          const cat = (item.category || "").replace(/-/g, " ").replace(/\b\w/g, c => c.toUpperCase());
          el.innerHTML =
            `<img src="${item.imageUrl}" alt="${item.title}" loading="lazy" draggable="false" />` +
            `<div class="extra-tile__overlay" aria-hidden="true">` +
              `<p class="extra-tile__overlay-title">${item.title}</p>` +
              (cat ? `<p class="extra-tile__overlay-cat">${cat}</p>` : "") +
            `</div>`;
          return el;
        }

        /* ── Populate grids ── */
        function loadProjects() {
          const data = window.projectsData;
          if (!data) return;

          const workGrid  = $("#work-grid");
          const extraGrid = $("#extra-grid");

          if (workGrid) {
            workGrid.innerHTML = "";
            (data.projects || []).forEach(p => {
              if (p.published) workGrid.appendChild(buildProjectCard(p));
            });
          }

          if (extraGrid) {
            extraGrid.innerHTML = "";
            (data.designs || []).forEach(d => extraGrid.appendChild(buildExtraTile(d)));
            // Double the tiles for seamless infinite loop
            [...extraGrid.children].forEach(n => extraGrid.appendChild(n.cloneNode(true)));
            // Start mid-animation so belt appears centred
            extraGrid.style.animationDelay = "-12.5s";
          }

          initObservers();
        }

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", loadProjects);
        } else {
          loadProjects();
        }

        /* ── Intersection Observer ── */
        function initObservers() {
          const obs = new IntersectionObserver(
            entries => entries.forEach(e => {
              if (e.isIntersecting) { e.target.classList.add("visible"); obs.unobserve(e.target); }
            }),
            { threshold: 0.05, rootMargin: "0px 0px -40px 0px" }
          );
          $$(".reveal, .stagger").forEach(el => obs.observe(el));
        }
        initObservers();

        /* ── Smooth scroll (no jank) ── */
        document.addEventListener("click", e => {
          const anchor = e.target.closest('a[href^="#"]');
          if (!anchor) return;
          const id = anchor.getAttribute("href");
          if (id === "#") return;
          const target = $(id);
          if (target) { e.preventDefault(); target.scrollIntoView({ behavior: "smooth", block: "start" }); }
        });

        /* ── Keyboard a11y ── */
        document.addEventListener("keydown", e => {
          if (e.key === "Tab") document.body.classList.add("keyboard-nav");
        });
        document.addEventListener("mousedown", () => document.body.classList.remove("keyboard-nav"));

        const a11y = document.createElement("style");
        a11y.textContent = `.keyboard-nav *:focus { outline: 2px solid var(--text) !important; outline-offset: 2px !important; }`;
        document.head.appendChild(a11y);
      })();
    </script>
  </body>
</html>
