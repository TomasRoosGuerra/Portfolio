<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tomas Roos — Designer</title>
    <meta
      name="description"
      content="Tomas Roos is a product and visual designer based in Stockholm."
    />
    <meta name="theme-color" content="#f2f2f2" />

    <meta property="og:title" content="Tomas Roos — Designer" />
    <meta
      property="og:description"
      content="Selected works in product design, UI/UX, and visual identity."
    />
    <meta property="og:type" content="website" />

    <link rel="icon" href="assets/favicon.png" />
    <link rel="preload" as="image" href="assets/tidings/tidings.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #f2f2f2;
        --text: #111;
        --text-secondary: #555;
        --accent: #bfff00;
        --accent-hover: #a8e600;
        --font: Roboto, -apple-system, BlinkMacSystemFont, "Segoe UI",
          Helvetica, Arial, sans-serif;
        --container: 1400px;
        --gutter: clamp(20px, 4vw, 64px);
        --ease: cubic-bezier(0.2, 0.6, 0.2, 1);
      }

      html {
        scroll-behavior: smooth;
        scroll-padding-top: 72px;
      }

      body {
        font-family: var(--font);
        color: var(--text);
        background: var(--bg);
        font-size: 16px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* ─── Header ─── */
      .site-header {
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 100;
        transition: background 0.4s var(--ease);
      }
      .site-header.scrolled {
        background: rgba(242, 242, 242, 0.92);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      .header-wrap {
        max-width: var(--container);
        margin: 0 auto;
        padding: 0 var(--gutter);
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 72px;
      }

      .brand {
        text-decoration: none;
        display: flex;
        align-items: center;
      }
      .brand-logo {
        height: 24px;
        width: auto;
        display: block;
        transition: opacity 0.2s ease;
      }
      .brand:hover .brand-logo {
        opacity: 0.5;
      }

      .nav__toggle {
        display: none;
        background: none;
        border: none;
        color: var(--text);
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        font-family: var(--font);
      }

      .nav__list {
        display: flex;
        list-style: none;
        gap: 32px;
      }
      .nav__list a {
        color: var(--text-secondary);
        text-decoration: none;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        transition: color 0.2s ease;
      }
      .nav__list a:hover {
        color: var(--text);
      }

      /* ─── Hero ─── */
      .hero {
        padding: 180px 0 100px;
      }
      .hero-wrap {
        max-width: var(--container);
        margin: 0 auto;
        padding: 0 var(--gutter);
      }
      .hero__title {
        font-size: clamp(3rem, 8vw, 7rem);
        font-weight: 300;
        line-height: 1;
        letter-spacing: -0.04em;
        color: var(--text);
        opacity: 0;
        animation: revealUp 1s 0.2s both var(--ease);
      }
      .hero__subtitle {
        font-size: clamp(1rem, 2vw, 1.25rem);
        color: var(--text-secondary);
        font-weight: 400;
        margin-top: 24px;
        max-width: 480px;
        line-height: 1.6;
        opacity: 0;
        animation: revealUp 1s 0.4s both var(--ease);
      }

      /* ─── About strip ─── */
      .about-bar {
        max-width: var(--container);
        margin: 0 auto;
        padding: 0 var(--gutter) 80px;
        display: flex;
        align-items: center;
        gap: 16px;
        opacity: 0;
        animation: revealUp 1s 0.6s both var(--ease);
      }
      .about-bar__avatar {
        width: 40px;
        height: 40px;
        overflow: hidden;
        flex-shrink: 0;
      }
      .about-bar__avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: grayscale(30%);
      }
      .about-bar__text {
        font-size: 13px;
        color: var(--text-secondary);
        line-height: 1.5;
      }
      .about-bar__badge {
        display: inline-block;
        padding: 2px 8px;
        background: var(--accent);
        color: var(--text);
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-left: 8px;
      }
      .about-bar__links {
        margin-left: auto;
        display: flex;
        gap: 20px;
        flex-shrink: 0;
      }
      .about-bar__link {
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--text-secondary);
        text-decoration: none;
        transition: color 0.2s ease;
      }
      .about-bar__link:hover {
        color: var(--text);
      }

      /* ─── Work grid ─── */
      .work {
        max-width: var(--container);
        margin: 0 auto;
        padding: 0 var(--gutter) 120px;
      }
      .work__label {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--text-secondary);
        margin-bottom: 48px;
        padding-bottom: 16px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      }
      .work__grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: clamp(40px, 6vw, 80px);
      }

      /* ─── Card ─── */
      .card {
        position: relative;
      }
      .card__link {
        display: block;
        text-decoration: none;
        color: inherit;
      }
      .card__img {
        aspect-ratio: 3/2;
        overflow: hidden;
        background: #e5e5e5;
      }
      .card__img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.7s var(--ease), opacity 0.5s ease;
      }
      .card:hover .card__img img {
        transform: scale(1.04);
        opacity: 0.88;
      }
      .card__info {
        padding-top: 20px;
      }
      .card__title {
        font-size: 18px;
        font-weight: 500;
        line-height: 1.3;
        margin-bottom: 4px;
      }
      .card__role {
        font-size: 13px;
        color: var(--text-secondary);
        font-weight: 400;
      }

      /* ─── Footer CTA ─── */
      .cta-section {
        padding: 120px 0;
        text-align: center;
      }
      .cta-section__wrap {
        max-width: var(--container);
        margin: 0 auto;
        padding: 0 var(--gutter);
      }
      .cta-section__heading {
        font-size: clamp(2rem, 5vw, 3.5rem);
        font-weight: 300;
        letter-spacing: -0.03em;
        line-height: 1.1;
        margin-bottom: 32px;
        color: var(--text);
      }
      .cta-section__btn {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 16px 40px;
        background: var(--accent);
        color: var(--text);
        text-decoration: none;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        transition: background 0.2s ease;
      }
      .cta-section__btn:hover {
        background: var(--accent-hover);
      }
      .cta-section__btn svg {
        flex-shrink: 0;
      }

      /* ─── Footer ─── */
      .site-footer {
        padding: 32px 0;
        border-top: 1px solid rgba(0, 0, 0, 0.08);
      }
      .site-footer__wrap {
        max-width: var(--container);
        margin: 0 auto;
        padding: 0 var(--gutter);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .site-footer__copy {
        font-size: 12px;
        color: var(--text-secondary);
      }
      .site-footer__link {
        font-size: 12px;
        color: var(--text-secondary);
        text-decoration: none;
        transition: color 0.2s ease;
      }
      .site-footer__link:hover {
        color: var(--text);
      }

      /* ─── Page loader ─── */
      .page-loader {
        position: fixed;
        inset: 0;
        z-index: 10000;
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.6s ease, visibility 0.6s ease;
      }
      .page-loader.loaded {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* ─── Cursor dot ─── */
      .cursor-dot {
        position: fixed;
        width: 8px;
        height: 8px;
        background: var(--text);
        border-radius: 50%;
        pointer-events: none;
        z-index: 9997;
        transform: translate(-50%, -50%);
        transition: width 0.25s ease, height 0.25s ease, background 0.25s ease, opacity 0.25s ease;
        mix-blend-mode: difference;
        opacity: 0;
      }
      .cursor-dot.visible { opacity: 1; }
      .cursor-dot.hover {
        width: 48px;
        height: 48px;
        background: var(--accent);
        mix-blend-mode: normal;
        opacity: 0.7;
      }

      /* ─── Lightbox ─── */
      .lightbox {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.94);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s var(--ease);
      }
      .lightbox[open] {
        opacity: 1;
        visibility: visible;
      }
      .lightbox__close {
        position: absolute;
        top: 24px;
        right: 24px;
        background: none;
        border: none;
        color: #fff;
        font-size: 28px;
        cursor: pointer;
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .lightbox__img {
        max-width: 90%;
        max-height: 90%;
        object-fit: contain;
      }

      /* ─── Animations ─── */
      @keyframes revealUp {
        from {
          opacity: 0;
          transform: translateY(40px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .reveal {
        opacity: 0;
        transform: translateY(30px);
        transition: opacity 0.8s var(--ease), transform 0.8s var(--ease);
      }
      .reveal.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .stagger > * {
        opacity: 0;
        transform: translateY(24px);
        transition: opacity 0.6s var(--ease), transform 0.6s var(--ease);
      }
      .stagger.visible > * {
        opacity: 1;
        transform: translateY(0);
      }
      .stagger.visible > *:nth-child(1) { transition-delay: 0s; }
      .stagger.visible > *:nth-child(2) { transition-delay: 0.08s; }
      .stagger.visible > *:nth-child(3) { transition-delay: 0.16s; }
      .stagger.visible > *:nth-child(4) { transition-delay: 0.24s; }
      .stagger.visible > *:nth-child(5) { transition-delay: 0.32s; }
      .stagger.visible > *:nth-child(6) { transition-delay: 0.4s; }
      .stagger.visible > *:nth-child(7) { transition-delay: 0.48s; }
      .stagger.visible > *:nth-child(8) { transition-delay: 0.56s; }
      .stagger.visible > *:nth-child(9) { transition-delay: 0.64s; }
      .stagger.visible > *:nth-child(10) { transition-delay: 0.72s; }
      .stagger.visible > *:nth-child(11) { transition-delay: 0.8s; }
      .stagger.visible > *:nth-child(12) { transition-delay: 0.88s; }

      /* ─── Responsive ─── */
      @media (max-width: 768px) {
        .cursor-dot { display: none !important; }

        .hero {
          padding: 120px 0 60px;
        }

        .nav__toggle {
          display: block;
        }
        .nav__list {
          position: absolute;
          top: 100%;
          left: 0;
          width: 100%;
          background: var(--bg);
          flex-direction: column;
          padding: 24px var(--gutter);
          gap: 20px;
          transform: translateY(-100%);
          opacity: 0;
          visibility: hidden;
          transition: all 0.3s var(--ease);
        }
        .nav__list.active {
          transform: translateY(0);
          opacity: 1;
          visibility: visible;
        }

        .work__grid {
          grid-template-columns: 1fr;
          gap: 48px;
        }

        .about-bar {
          flex-wrap: wrap;
          gap: 12px;
        }
        .about-bar__links {
          margin-left: 0;
          width: 100%;
          padding-top: 8px;
        }

        .cta-section {
          padding: 80px 0;
        }
      }

      @media (max-width: 480px) {
        .hero__title {
          font-size: 2.5rem;
        }
        .cta-section__heading {
          font-size: 1.75rem;
        }
        .site-footer__wrap {
          flex-direction: column;
          gap: 8px;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-loader" aria-hidden="true">
      <img src="assets/tomas-roos-logo.svg" alt="" style="height:28px;opacity:0.3" />
    </div>
    <div class="cursor-dot" aria-hidden="true"></div>

    <header class="site-header">
      <div class="header-wrap">
        <a class="brand" href="#top">
          <img src="assets/tomas-roos-logo.svg" alt="Tomas Roos" class="brand-logo" />
        </a>
        <nav class="nav" aria-label="Primary">
          <button class="nav__toggle" aria-expanded="false" aria-controls="nav-menu">Menu</button>
          <ul id="nav-menu" class="nav__list">
            <li><a href="#work">Work</a></li>
            <li><a href="mailto:tomas.roosguerra@gmail.com">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="content">
      <section id="top" class="hero">
        <div class="hero-wrap">
          <h1 class="hero__title">Visual &amp;<br/>Product Designer</h1>
          <p class="hero__subtitle">Crafting interfaces that startups count on — based in Stockholm, open to remote.</p>
        </div>
      </section>

      <div class="about-bar" id="about">
        <div class="about-bar__avatar">
          <img src="assets/other/tomas-portrait.jpg" alt="Tomas Roos" loading="lazy" />
        </div>
        <div class="about-bar__text">
          Tomas Roos<span class="about-bar__badge">Available</span>
        </div>
        <div class="about-bar__links">
          <a class="about-bar__link" href="mailto:tomas.roosguerra@gmail.com">Email</a>
          <a class="about-bar__link" href="https://www.linkedin.com/in/tomas-roos/" target="_blank" rel="noopener">LinkedIn</a>
        </div>
      </div>

      <section id="work" class="work">
        <p class="work__label">Selected Work</p>
        <div class="work__grid stagger">
          <!-- Populated by JS -->
        </div>
      </section>
    </main>

    <section class="cta-section reveal">
      <div class="cta-section__wrap">
        <h2 class="cta-section__heading">Let's create something<br/>people love to use.</h2>
        <a class="cta-section__btn" href="mailto:tomas.roosguerra@gmail.com">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          Get in touch
        </a>
      </div>
    </section>

    <footer class="site-footer">
      <div class="site-footer__wrap">
        <span class="site-footer__copy">© <span id="year"></span> Tomas Roos</span>
        <a class="site-footer__link" href="https://www.linkedin.com/in/tomas-roos/" target="_blank" rel="noopener">LinkedIn</a>
      </div>
    </footer>

    <dialog class="lightbox" aria-label="Image Viewer">
      <button class="lightbox__close" aria-label="Close lightbox">×</button>
      <img class="lightbox__img" src="" alt="Expanded image" />
    </dialog>

    <script src="js/projects-data.js"></script>
    <script>
      (() => {
        "use strict";

        const $ = (s) => document.querySelector(s);
        const $$ = (s) => [...document.querySelectorAll(s)];
        const lerp = (a, b, t) => a + (b - a) * t;

        /* Year */
        const yearEl = $("#year");
        if (yearEl) yearEl.textContent = new Date().getFullYear();

        /* Page Loader */
        window.addEventListener("load", () => {
          const loader = $(".page-loader");
          if (loader) {
            setTimeout(() => loader.classList.add("loaded"), 200);
            setTimeout(() => loader.remove(), 900);
          }
        });

        /* Cursor Dot */
        const dot = $(".cursor-dot");
        if (dot && window.matchMedia("(pointer: fine)").matches) {
          let mx = 0, my = 0, dx = 0, dy = 0;
          document.addEventListener("mousemove", (e) => { mx = e.clientX; my = e.clientY; dot.classList.add("visible"); });
          document.addEventListener("mouseleave", () => dot.classList.remove("visible"));

          (function tick() {
            dx = lerp(dx, mx, 0.14);
            dy = lerp(dy, my, 0.14);
            dot.style.left = dx + "px";
            dot.style.top = dy + "px";
            requestAnimationFrame(tick);
          })();

          const targets = "a, button, .card";
          document.addEventListener("mouseover", (e) => { if (e.target.closest(targets)) dot.classList.add("hover"); });
          document.addEventListener("mouseout", (e) => { if (e.target.closest(targets)) dot.classList.remove("hover"); });
        }

        /* Load projects */
        function loadProjects() {
          const grid = $(".work__grid");
          if (!grid || !window.projectsData) return;

          grid.innerHTML = "";

          function add(item, isDesign) {
            const el = document.createElement("article");
            el.className = "card";

            const href = item.caseStudyUrl || "#";
            const attrs = isDesign && !item.caseStudyUrl
              ? `href="#" data-lightbox="${item.imageUrl}"`
              : `href="${href}"`;

            const role = item.role || item.category || "Design";

            el.innerHTML =
              `<a class="card__link" ${attrs}>` +
                `<div class="card__img"><img src="${item.imageUrl}" alt="${item.title}" loading="lazy" width="1600" height="1066" /></div>` +
                `<div class="card__info">` +
                  `<h3 class="card__title">${item.title}</h3>` +
                  `<p class="card__role">${role}</p>` +
                `</div>` +
              `</a>`;

            grid.appendChild(el);
          }

          window.projectsData.projects.forEach((p) => { if (p.published) add(p, false); });
          window.projectsData.designs.forEach((d) => add(d, true));

          initObservers();
        }

        document.addEventListener("DOMContentLoaded", loadProjects);

        /* Mobile nav */
        const navToggle = $(".nav__toggle");
        const navMenu = $(".nav__list");
        navToggle?.addEventListener("click", () => {
          const open = navToggle.getAttribute("aria-expanded") === "true";
          navToggle.setAttribute("aria-expanded", !open);
          navMenu?.classList.toggle("active");
        });
        $$(".nav__list a").forEach((a) =>
          a.addEventListener("click", () => {
            navToggle?.setAttribute("aria-expanded", "false");
            navMenu?.classList.remove("active");
          })
        );

        /* Header scroll */
        const header = $(".site-header");
        let ticking = false;
        window.addEventListener("scroll", () => {
          if (!ticking) {
            requestAnimationFrame(() => {
              header?.classList.toggle("scrolled", window.scrollY > 40);
              ticking = false;
            });
            ticking = true;
          }
        });

        /* Intersection Observer */
        function initObservers() {
          const obs = new IntersectionObserver(
            (entries) => entries.forEach((e) => { if (e.isIntersecting) { e.target.classList.add("visible"); obs.unobserve(e.target); } }),
            { threshold: 0.06, rootMargin: "0px 0px -60px 0px" }
          );
          $$(".reveal, .stagger").forEach((el) => obs.observe(el));
        }
        initObservers();

        /* Lightbox */
        const lightbox = $(".lightbox");
        const lightboxImg = $(".lightbox__img");
        const lightboxClose = $(".lightbox__close");

        document.addEventListener("click", (e) => {
          const trigger = e.target.closest("[data-lightbox]");
          if (trigger) {
            e.preventDefault();
            lightboxImg.src = trigger.getAttribute("data-lightbox");
            lightbox?.showModal();
          }
        });
        lightboxClose?.addEventListener("click", () => lightbox?.close());
        lightbox?.addEventListener("click", (e) => { if (e.target === lightbox) lightbox.close(); });

        /* Smooth scroll */
        document.addEventListener("click", (e) => {
          const anchor = e.target.closest('a[href^="#"]');
          if (!anchor) return;
          const id = anchor.getAttribute("href");
          if (id === "#") return;
          const target = $(id);
          if (target) { e.preventDefault(); target.scrollIntoView({ behavior: "smooth", block: "start" }); }
        });

        /* Keyboard a11y */
        document.addEventListener("keydown", (e) => {
          if (e.key === "Tab") document.body.classList.add("keyboard-nav");
          if (e.key === "Escape" && lightbox?.open) lightbox.close();
        });
        document.addEventListener("mousedown", () => document.body.classList.remove("keyboard-nav"));

        const a11y = document.createElement("style");
        a11y.textContent = `.keyboard-nav *:focus { outline: 2px solid var(--text) !important; outline-offset: 2px !important; }`;
        document.head.appendChild(a11y);
      })();
    </script>
  </body>
</html>
